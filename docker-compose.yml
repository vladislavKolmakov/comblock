services:
  db:
    image: postgres:17
    container_name: news_parser_db
    environment:
      POSTGRES_DB: news_parser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news_parser"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: news_parser_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
    name: news_parser_postgres_data_testtask
